site_name: TS-CNN-GRU Repository Wiki
site_description: Comprehensive documentation for the TS-CNN-GRU project
site_author: cumulonimbus1914
repo_url: https://github.com/cumulonimbus1914/ts-cnn-gru-repowiki

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - toc.integrate

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code
  - codehilite
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
